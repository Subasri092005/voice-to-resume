<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume AI — Voice Resume Builder</title>
  <meta name="description"
    content="Build your professional resume entirely by voice. Accessible resume builder for everyone." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/assistant.css') }}">
</head>

<body>

  <!-- Accessibility toolbar -->
  <div class="a11y-bar" role="toolbar" aria-label="Accessibility controls">
    <span class="a11y-label">Accessibility</span>
    <button id="btn-contrast" class="a11y-btn" title="Toggle high contrast" aria-pressed="false">
      ◑ Contrast
    </button>
    <button id="btn-font-dec" class="a11y-btn" title="Decrease font size" aria-label="Decrease font size">A−</button>
    <button id="btn-font-inc" class="a11y-btn" title="Increase font size" aria-label="Increase font size">A+</button>
    <button id="btn-replay" class="a11y-btn" title="Replay last question" aria-label="Replay last question">🔊
      Replay</button>
    <span class="a11y-divider"></span>
    <button id="btn-lang" class="a11y-btn lang-btn" title="Switch language: English / Tamil"
      aria-label="Switch speech language">
      🌐 EN
    </button>
  </div>

  <div class="app-shell" id="app-shell">

    <!-- Sidebar progress -->
    <aside class="sidebar" aria-label="Resume building progress">
      <div class="sidebar-brand">
        <div class="brand-icon">📄</div>
        <div class="brand-name">Resume<span class="brand-ai">AI</span></div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-pct" id="progress-pct">0% complete</div>
      <nav class="step-list" id="step-list" aria-label="Conversation steps">
        <!-- Dynamically populated -->
      </nav>
    </aside>

    <!-- Main area -->
    <main class="main" role="main">

      <!-- Chat -->
      <div class="chat-scroll" id="chat-scroll">
        <div class="chat-messages" id="messages" aria-live="assertive" aria-label="Conversation" role="log"></div>
      </div>

      <!-- Template cards (shown during template step) -->
      <div class="template-picker" id="template-picker" style="display:none;" role="group"
        aria-label="Choose resume template">
        <div class="tp-cards">
          <button class="tp-card" id="tp-modern" data-template="modern" aria-label="Template 1: Modern">
            <div class="tp-preview" style="background:linear-gradient(135deg,#0066cc,#004499)">
              <div class="tp-preview-name">John Doe</div>
              <div class="tp-preview-bar"></div>
              <div class="tp-preview-lines">
                <span></span><span></span><span></span>
              </div>
            </div>
            <div class="tp-info">
              <div class="tp-number">1</div>
              <div class="tp-name">Modern</div>
              <div class="tp-desc">Blue gradient, skill badges</div>
            </div>
          </button>
          <button class="tp-card" id="tp-classic" data-template="classic" aria-label="Template 2: Classic">
            <div class="tp-preview" style="background:#f5f5f5;border:1px solid #ddd">
              <div class="tp-preview-name" style="color:#111;border-bottom:2px solid #111">John Doe</div>
              <div class="tp-preview-lines">
                <span style="background:#555"></span><span style="background:#555"></span><span
                  style="background:#555"></span>
              </div>
            </div>
            <div class="tp-info">
              <div class="tp-number">2</div>
              <div class="tp-name">Classic</div>
              <div class="tp-desc">Traditional &amp; professional</div>
            </div>
          </button>
          <button class="tp-card" id="tp-minimal" data-template="minimal" aria-label="Template 3: Minimal">
            <div class="tp-preview" style="background:#fafafa">
              <div class="tp-preview-name" style="color:#1a1a1a">John Doe</div>
              <div style="width:36px;height:3px;background:#00897B;margin:6px 8px;border-radius:2px"></div>
              <div class="tp-preview-lines">
                <span style="background:#00897B;opacity:.5"></span><span style="background:#aaa"></span><span
                  style="background:#aaa"></span>
              </div>
            </div>
            <div class="tp-info">
              <div class="tp-number">3</div>
              <div class="tp-name">Minimal</div>
              <div class="tp-desc">Clean, teal accent lines</div>
            </div>
          </button>
        </div>
      </div>

      <!-- Resume preview -->
      <div class="resume-panel" id="resume-panel" style="display:none">
        <div class="resume-panel-header">
          <h2>✅ Your Resume is Ready!</h2>
          <div class="resume-actions">
            <button id="btn-print" class="btn-action btn-primary">🖨️ Print / Save PDF</button>
            <button id="btn-restart" class="btn-action btn-secondary">🔄 Start Over</button>
          </div>
        </div>
        <div class="resume-frame-wrap">
          <iframe id="resume-frame" title="Your resume preview" tabindex="0"></iframe>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area" id="input-area">
        <!-- Waveform (shown while listening) -->
        <div class="waveform" id="waveform" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <!-- Live transcript preview (shown during speech recognition) -->
        <div class="live-transcript" id="live-transcript" style="display:none" aria-live="polite">
          <span class="live-label">Hearing:</span>
          <span class="live-text" id="live-text"></span>
        </div>

        <div class="input-row">
          <!-- Text input fallback -->
          <div class="text-input-wrap">
            <input type="text" id="text-input" class="text-input" placeholder="Or type your answer here…"
              aria-label="Type your answer" autocomplete="off" />
            <button id="send-btn" class="send-btn" aria-label="Send answer" title="Send">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>

          <!-- Mic button -->
          <button id="mic-btn" class="mic-btn" aria-label="Tap to speak" disabled>
            <span class="mic-icon">🎤</span>
            <span class="mic-ring"></span>
          </button>
        </div>
        <div class="input-hint" id="input-hint" aria-live="polite">Starting conversation…</div>
      </div>

    </main>
  </div>

  <script>
    // ══════════════════════════════════════════════
    //  CONFIG & STATE
    // ══════════════════════════════════════════════
    const API = "";

    // Voice input strategy:
    //   "browser"  — Web Speech API (free, in-browser, Chrome/Edge)
    //   "whisper"  — MediaRecorder → POST /transcribe → Groq Whisper
    //   "none"     — no voice at all, text-only
    let voiceMode = "none";

    let sessionId = null;
    let currentStep = null;
    let recognizing = false;
    let aiSpeaking = false;
    let lastAIText = "";
    let fontScale = 1;
    let resumeData = null;

    // Language setting: "en-US" or "ta-IN" (Tamil)
    let speechLang = "en-US";

    // MediaRecorder state (for Whisper path)
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let micStream = null;

    // Step labels & icons for sidebar
    const STEP_META = {
      greeting: { icon: "👋", label: "Welcome" },
      template: { icon: "🎨", label: "Template" },
      name: { icon: "👤", label: "Name" },
      email: { icon: "📧", label: "Email" },
      phone: { icon: "📞", label: "Phone" },
      linkedin: { icon: "🔗", label: "LinkedIn" },
      github: { icon: "💻", label: "GitHub" },
      job_role: { icon: "💼", label: "Job Role" },
      summary: { icon: "📝", label: "Summary" },
      skills: { icon: "🛠️", label: "Skills" },
      experience: { icon: "🏢", label: "Experience" },
      education: { icon: "🎓", label: "Education" },
      projects: { icon: "🚀", label: "Projects" },
      certifications: { icon: "🏅", label: "Certs" },
      additional: { icon: "⭐", label: "Extras" },
      preview: { icon: "👀", label: "Preview" },
      done: { icon: "✅", label: "Done" },
    };
    const STEP_ORDER = Object.keys(STEP_META);
    let completedSteps = new Set();

    // DOM refs
    const messagesEl = document.getElementById("messages");
    const micBtn = document.getElementById("mic-btn");
    const sendBtn = document.getElementById("send-btn");
    const textInput = document.getElementById("text-input");
    const inputHint = document.getElementById("input-hint");
    const waveform = document.getElementById("waveform");
    const templatePicker = document.getElementById("template-picker");
    const resumePanel = document.getElementById("resume-panel");
    const resumeFrame = document.getElementById("resume-frame");
    const progressFill = document.getElementById("progress-fill");
    const progressPct = document.getElementById("progress-pct");
    const stepList = document.getElementById("step-list");
    const liveTranscript = document.getElementById("live-transcript");
    const liveText = document.getElementById("live-text");


    // ══════════════════════════════════════════════
    //  SIDEBAR
    // ══════════════════════════════════════════════
    function buildSidebar() {
      stepList.innerHTML = "";
      STEP_ORDER.forEach(id => {
        const meta = STEP_META[id];
        const el = document.createElement("div");
        el.className = "step-item";
        el.dataset.step = id;
        el.setAttribute("role", "listitem");
        el.innerHTML = `<span class="step-icon">${meta.icon}</span><span class="step-label">${meta.label}</span>`;
        stepList.appendChild(el);
      });
    }

    function updateSidebar(activeId) {
      stepList.querySelectorAll(".step-item").forEach(el => {
        const id = el.dataset.step;
        el.classList.remove("active", "done");
        if (id === activeId) el.classList.add("active");
        else if (completedSteps.has(id)) el.classList.add("done");
      });
      const total = STEP_ORDER.length;
      const doneIdx = Math.max(0, STEP_ORDER.indexOf(activeId));
      const pct = Math.round((doneIdx / (total - 1)) * 100);
      progressFill.style.width = pct + "%";
      progressPct.textContent = pct + "% complete";
    }


    // ══════════════════════════════════════════════
    //  MESSAGES
    // ══════════════════════════════════════════════
    function addMessage(text, sender) {
      const wrap = document.createElement("div");
      wrap.className = `msg msg-${sender}`;
      if (sender === "ai") {
        wrap.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="msg-body"><div class="msg-bubble ai-bubble">${text}</div></div>
    `;
      } else {
        wrap.innerHTML = `
      <div class="msg-body"><div class="msg-bubble user-bubble">${text}</div></div>
      <div class="msg-avatar user-avatar">🧑</div>
    `;
      }
      messagesEl.appendChild(wrap);
      setTimeout(() => { document.getElementById("chat-scroll").scrollTop = 99999; }, 50);
    }

    function addTypingIndicator() {
      const wrap = document.createElement("div");
      wrap.className = "msg msg-ai typing-msg";
      wrap.id = "typing-indicator";
      wrap.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-body">
      <div class="msg-bubble ai-bubble typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  `;
      messagesEl.appendChild(wrap);
      document.getElementById("chat-scroll").scrollTop = 99999;
    }

    function removeTypingIndicator() {
      const el = document.getElementById("typing-indicator");
      if (el) el.remove();
    }


    // ══════════════════════════════════════════════
    //  TTS
    // ══════════════════════════════════════════════
    function speak(text, onDone) {
      if (!text) return;
      lastAIText = text;
      aiSpeaking = true;
      micBtn.disabled = true;
      setHint("AI is speaking…");

      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 0.95;
      utter.pitch = 1;
      utter.lang = speechLang === "ta-IN" ? "ta-IN" : "en-US";

      utter.onend = () => {
        aiSpeaking = false;
        if (onDone) { onDone(); return; }
        if (currentStep && currentStep !== "preview" && currentStep !== "done") {
          micBtn.disabled = false;
          setHint("Listening… speak now");
          // Auto-start voice input after AI finishes speaking (only if not already recognizing)
          setTimeout(() => { if (!recognizing && !aiSpeaking) startVoiceInput(); }, 700);
        }
      };
      utter.onerror = () => {
        aiSpeaking = false;
        micBtn.disabled = false;
        if (onDone) { onDone(); return; }
        setHint("Listening… speak now");
        setTimeout(() => { if (!recognizing && !aiSpeaking) startVoiceInput(); }, 700);
      };

      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utter);
    }

    function setHint(text) { inputHint.textContent = text; }

    // (Confirmation flow removed — answers are submitted directly for faster, smoother interaction)


    // ══════════════════════════════════════════════
    //  VOICE INPUT — detects best mode on startup
    // ══════════════════════════════════════════════

    // ── Browser Web Speech API (primary — free, no server) ──
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognizer = null;

    // Silence timer: how long to wait after last speech event before auto-submitting
    const SILENCE_MS = 1500;
    let silenceTimer = null;
    let accumulatedTranscript = "";

    function resetSilenceTimer() {
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(() => {
        // User has been silent for SILENCE_MS — stop listening and submit
        if (recognizing) {
          try { recognizer.stop(); } catch (e) { }
        }
      }, SILENCE_MS);
    }

    function setupBrowserSR() {
      recognizer = new SR();
      recognizer.lang = speechLang;
      recognizer.continuous = true;       // Keep listening until silence timer fires
      recognizer.interimResults = true;

      recognizer.onstart = () => {
        recognizing = true;
        accumulatedTranscript = "";
        clearTimeout(silenceTimer);
        micBtn.classList.add("listening");
        waveform.classList.add("active");
        liveTranscript.style.display = "flex";
        liveText.textContent = "";
        setHint("Listening… speak now (tap mic when done)");
      };
      recognizer.onend = () => {
        recognizing = false;
        clearTimeout(silenceTimer);
        micBtn.classList.remove("listening");
        waveform.classList.remove("active");
        liveTranscript.style.display = "none";
        // Submit whatever was accumulated
        const heard = accumulatedTranscript.trim();
        accumulatedTranscript = "";
        if (heard) {
          if (currentStep === "template") hideTemplatePicker();
          submitAnswer(heard);
        } else if (!aiSpeaking) {
          setHint("Press the mic button or type your answer");
        }
      };
      recognizer.onerror = e => {
        recognizing = false;
        clearTimeout(silenceTimer);
        micBtn.classList.remove("listening");
        waveform.classList.remove("active");
        liveTranscript.style.display = "none";
        accumulatedTranscript = "";
        if (e.error === "not-allowed") {
          setHint("Mic blocked. Please type your answer.");
          voiceMode = "none";
          micBtn.disabled = true;
        } else if (e.error === "aborted") {
          // Aborted intentionally (e.g. language switch), ignore
        } else {
          if (!aiSpeaking) setHint("Voice error — tap mic to try again");
          console.warn("[SR Error]", e.error);
        }
      };
      recognizer.onresult = event => {
        let interimTranscript = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            accumulatedTranscript += transcript + " ";
          } else {
            interimTranscript += transcript;
          }
        }
        // Show live preview
        liveText.textContent = (accumulatedTranscript + interimTranscript).trim();
        liveTranscript.style.display = "flex";
        // Reset the silence timer on every new speech event
        resetSilenceTimer();
      };
    }

    // ── Groq Whisper path (fallback — records audio → POST /transcribe) ──
    async function setupWhisperMode() {
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        voiceMode = "whisper";
        micBtn.disabled = false;
        setHint("Press the mic button or type your answer");
        console.log("[VOICE] Using Groq Whisper mode");
      } catch {
        voiceMode = "none";
        micBtn.disabled = true;
        setHint("Mic not available — please type your answers.");
      }
    }

    function initVoiceMode() {
      if (SR) {
        try {
          voiceMode = "browser";
          setupBrowserSR();  // creates recognizer internally
          micBtn.disabled = false;
          console.log("[VOICE] Using Browser Web Speech API");
        } catch {
          setupWhisperMode();
        }
      } else {
        // No browser SpeechRecognition — try Groq Whisper
        setupWhisperMode();
      }
    }

    // Recreate the recognizer when language changes so the new lang takes effect cleanly
    function reinitRecognizer() {
      if (voiceMode !== "browser" || !SR) return;
      if (recognizing) {
        try { recognizer.stop(); } catch (e) { }
        recognizing = false;
      }
      setupBrowserSR();
    }

    // ── Unified start/stop ──
    function startVoiceInput() {
      if (aiSpeaking) return;
      if (voiceMode === "browser" && recognizer && !recognizing) {
        // Update language in case user toggled it
        recognizer.lang = speechLang;
        try { recognizer.start(); } catch (e) { console.warn("SR start error", e); }
      } else if (voiceMode === "whisper" && !isRecording) {
        startWhisperRecording();
      }
    }

    function stopVoiceInput() {
      if (voiceMode === "browser" && recognizer && recognizing) {
        recognizer.stop();
      } else if (voiceMode === "whisper" && isRecording) {
        stopWhisperRecording();
      }
    }

    // ── Whisper recording mechanics ──
    function startWhisperRecording() {
      if (!micStream) return;
      audioChunks = [];
      mediaRecorder = new MediaRecorder(micStream);

      mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) audioChunks.push(e.data);
      };

      mediaRecorder.onstop = async () => {
        isRecording = false;
        micBtn.classList.remove("listening");
        waveform.classList.remove("active");
        setHint("Transcribing with Groq Whisper…");
        micBtn.disabled = true;

        const blob = new Blob(audioChunks, { type: "audio/webm" });
        await sendAudioToWhisper(blob);
      };

      mediaRecorder.start();
      isRecording = true;
      micBtn.classList.add("listening");
      waveform.classList.add("active");
      setHint("Recording… tap mic button to stop");
    }

    function stopWhisperRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
      }
    }

    async function sendAudioToWhisper(blob) {
      try {
        const formData = new FormData();
        formData.append("file", blob, "recording.webm");
        if (currentStep) formData.append("field", currentStep);
        if (sessionId) formData.append("session_id", sessionId);
        // Include language as fallback if session_id not available
        formData.append("language", speechLang === "ta-IN" ? "ta" : "en");

        const res = await fetch(`${API}/transcribe`, { method: "POST", body: formData });
        const data = await res.json();

        if (data.error) {
          setHint(`Transcription error. Listening again…`);
          micBtn.disabled = false;
          setTimeout(startVoiceInput, 1000);
          return;
        }

        const text = (data.text || "").trim();
        if (text) {
          if (currentStep === "template") hideTemplatePicker();
          submitAnswer(text);
        } else {
          setHint("Couldn't hear anything. Tap mic to try again.");
          micBtn.disabled = false;
        }
      } catch (e) {
        console.error("[WHISPER ERROR]", e);
        setHint("Transcription failed. Listening again…");
        micBtn.disabled = false;
        setTimeout(startVoiceInput, 1000);
      }
    }


    // ══════════════════════════════════════════════
    //  TEMPLATE PICKER
    // ══════════════════════════════════════════════
    function showTemplatePicker() {
      templatePicker.style.display = "block";
      document.querySelectorAll(".tp-card").forEach(c => c.classList.remove("selected"));
    }

    function hideTemplatePicker() {
      templatePicker.style.display = "none";
    }

    document.querySelectorAll(".tp-card").forEach(card => {
      card.addEventListener("click", () => {
        const tmpl = card.dataset.template;
        document.querySelectorAll(".tp-card").forEach(c => c.classList.remove("selected"));
        card.classList.add("selected");
        const nameMap = { modern: "one", classic: "two", minimal: "three" };
        setTimeout(() => {
          hideTemplatePicker();
          submitAnswer(`I choose ${nameMap[tmpl] || tmpl}`);
        }, 400);
      });
    });


    // ══════════════════════════════════════════════
    //  CONVERSATION FLOW
    // ══════════════════════════════════════════════
    async function initConversation() {
      micBtn.disabled = true;
      setHint("Starting conversation…");
      buildSidebar();
      try {
        const res = await fetch(`${API}/conversation/init`);
        const j = await res.json();
        sessionId = j.session_id;
        currentStep = j.step_id;
        resumeData = j.data;

        // Sync language from server if provided
        if (j.language) {
          const serverLang = j.language === "ta" ? "ta-IN" : "en-US";
          if (serverLang !== speechLang) {
            speechLang = serverLang;
            const btnLang = document.getElementById("btn-lang");
            if (serverLang === "ta-IN") {
              btnLang.textContent = "🌐 TA";
              btnLang.classList.add("active");
            } else {
              btnLang.textContent = "🌐 EN";
              btnLang.classList.remove("active");
            }
          }
        }

        updateSidebar(j.step_id);
        addMessage(j.question, "ai");
        speak(j.question);
      } catch (e) {
        console.error(e);
        addMessage("Sorry, couldn't connect to the server. Please refresh.", "ai");
      }
    }

    async function submitAnswer(text) {
      if (!sessionId || !text.trim()) return;

      addMessage(text, "user");
      micBtn.disabled = true;
      sendBtn.disabled = true;
      textInput.value = "";
      setHint("Processing with Groq AI…");

      if (currentStep) completedSteps.add(currentStep);
      addTypingIndicator();

      try {
        const res = await fetch(`${API}/conversation/submit`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, text }),
        });
        const j = await res.json();
        removeTypingIndicator();

        currentStep = j.step_id;
        resumeData = j.data;
        updateSidebar(j.step_id);

        // SYNC language with server — if server language changed, update frontend
        if (j.language) {
          const serverLang = j.language === "ta" ? "ta-IN" : "en-US";
          if (serverLang !== speechLang) {
            speechLang = serverLang;
            const btnLang = document.getElementById("btn-lang");
            if (serverLang === "ta-IN") {
              btnLang.textContent = "🌐 TA";
              btnLang.classList.add("active");
              console.log("[LANG SYNC] Synced to Tamil");
            } else {
              btnLang.textContent = "🌐 EN";
              btnLang.classList.remove("active");
              console.log("[LANG SYNC] Synced to English");
            }
          }
        }

        if (j.step_id === "preview") {
          addMessage(j.question, "ai");
          speak(j.question);
          await generateResume(j.data);
        } else if (j.step_id === "done") {
          addMessage(j.question, "ai");
          speak(j.question);
          completedSteps.add("done");
          updateSidebar("done");
          setHint("Your resume is ready! Use the Print / Save PDF button.");
          micBtn.disabled = true;
        } else {
          setTimeout(() => {
            if (j.step_id === "template") showTemplatePicker();
            addMessage(j.question, "ai");
            speak(j.question);
          }, 300);
        }

        sendBtn.disabled = false;
      } catch (e) {
        removeTypingIndicator();
        console.error(e);
        addMessage("Something went wrong. Please try again.", "ai");
        speak("Something went wrong. Please try again.");
        sendBtn.disabled = false;
        micBtn.disabled = false;
      }
    }

    async function generateResume(data) {
      try {
        const res = await fetch(`${API}/resume/preview`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const j = await res.json();
        const doc = resumeFrame.contentDocument || resumeFrame.contentWindow.document;
        doc.open();
        doc.write(j.html);
        doc.close();
        resumePanel.style.display = "block";
        setTimeout(() => resumePanel.scrollIntoView({ behavior: "smooth", block: "start" }), 200);
      } catch (e) {
        console.error(e);
        addMessage("Could not generate preview. Please try again.", "ai");
      }
    }


    // ══════════════════════════════════════════════
    //  MIC BUTTON — unified handler
    // ══════════════════════════════════════════════
    micBtn.addEventListener("click", () => {
      if (aiSpeaking) {
        window.speechSynthesis.cancel();
        aiSpeaking = false;
      }

      if (voiceMode === "browser") {
        if (recognizing) stopVoiceInput();
        else startVoiceInput();
      } else if (voiceMode === "whisper") {
        if (isRecording) stopWhisperRecording();
        else startWhisperRecording();
      }
    });


    // ══════════════════════════════════════════════
    //  TEXT INPUT
    // ══════════════════════════════════════════════
    function handleTextSubmit() {
      const val = textInput.value.trim();
      if (!val) return;
      if (currentStep === "template") hideTemplatePicker();
      textInput.value = "";
      submitAnswer(val);
    }

    textInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        handleTextSubmit();
      }
    });

    sendBtn.addEventListener("click", () => {
      handleTextSubmit();
    });


    // ══════════════════════════════════════════════
    //  EXPORT / PRINT
    // ══════════════════════════════════════════════
    document.getElementById("btn-print").addEventListener("click", () => {
      if (resumeFrame.contentWindow) resumeFrame.contentWindow.print();
    });

    document.getElementById("btn-restart").addEventListener("click", () => {
      if (confirm("Start over? Your current resume data will be lost.")) location.reload();
    });


    // ══════════════════════════════════════════════
    //  ACCESSIBILITY
    // ══════════════════════════════════════════════
    document.getElementById("btn-replay").addEventListener("click", () => {
      if (lastAIText) speak(lastAIText);
    });

    const btnContrast = document.getElementById("btn-contrast");
    btnContrast.addEventListener("click", () => {
      const on = document.body.classList.toggle("high-contrast");
      btnContrast.setAttribute("aria-pressed", on.toString());
      btnContrast.classList.toggle("active", on);
    });

    document.getElementById("btn-font-dec").addEventListener("click", () => {
      fontScale = Math.max(0.8, fontScale - 0.1);
      document.documentElement.style.setProperty("--font-scale", fontScale);
    });
    document.getElementById("btn-font-inc").addEventListener("click", () => {
      fontScale = Math.min(1.5, fontScale + 0.1);
      document.documentElement.style.setProperty("--font-scale", fontScale);
    });

    // Language toggle: EN ↔ Tamil (with server sync)
    const btnLang = document.getElementById("btn-lang");
    btnLang.addEventListener("click", async () => {
      const oldLang = speechLang;
      const newServerLang = speechLang === "en-US" ? "ta" : "en";
      const newSpeechLang = newServerLang === "ta" ? "ta-IN" : "en-US";

      // Update frontend speech language immediately
      speechLang = newSpeechLang;
      // Recreate recognizer with new language so it works cleanly
      reinitRecognizer();

      // Update button UI
      if (newServerLang === "ta") {
        btnLang.textContent = "🌐 TA";
        btnLang.classList.add("active");
      } else {
        btnLang.textContent = "🌐 EN";
        btnLang.classList.remove("active");
      }

      // Sync with server: update session language and get current question in new language
      if (sessionId && currentStep && currentStep !== "done") {
        try {
          const res = await fetch(`${API}/conversation/set-language`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: sessionId, language: newServerLang }),
          });
          const j = await res.json();

          if (j.question) {
            // Remove old question from chat and re-ask in new language
            if (messagesEl.lastChild && messagesEl.lastChild.classList.contains("msg-ai")) {
              messagesEl.lastChild.remove();
            }

            // Add language switch message
            const notifyMsg = newServerLang === "ta"
              ? "English থেকে Tamil এ স্যুইচ করা হয়েছে. এখন Tamil এ প্রশ্ন জিজ্ঞাস করা হবে."
              : "Tamil থেকে English এ স্যুইচ করা হয়েছে. এখন English এ প্রশ্ন জিজ্ঞাস করা হবে.";

            // Re-ask the current question in the new language
            addMessage(j.question, "ai");
            speak(j.question);

            console.log(`[LANG SWITCH] Changed from ${oldLang} to ${newSpeechLang}, server synced`);
          }
        } catch (e) {
          console.error("[LANG SWITCH ERROR]", e);
          // Revert speech language on error
          speechLang = oldLang;
          if (oldLang === "ta-IN") {
            btnLang.textContent = "🌐 TA";
            btnLang.classList.add("active");
          } else {
            btnLang.textContent = "🌐 EN";
            btnLang.classList.remove("active");
          }
        }
      } else {
        // If not in conversation yet, just show a message
        const msg = newServerLang === "ta"
          ? "வணக்கம்! இப்போது தமிழ் மொழিতে பேச முடியும்."
          : "Hello! You can now speak in English.";
        addMessage(msg, "ai");
        speak(msg);
      }
    });


    // ══════════════════════════════════════════════
    //  INIT
    // ══════════════════════════════════════════════
    window.addEventListener("load", async () => {
      initVoiceMode();
      await initConversation();
    });
  </script>
</body>

</html>
